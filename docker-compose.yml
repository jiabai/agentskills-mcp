services:
  db:
    image: postgres:14
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agentskills}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agentskills}
      POSTGRES_DB: ${POSTGRES_DB:-agentskills}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agentskills} -d ${POSTGRES_DB:-agentskills}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  migrate:
    build: .
    command: sh -c "alembic upgrade head"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-agentskills}:${POSTGRES_PASSWORD:-agentskills}@db:5432/${POSTGRES_DB:-agentskills}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  api:
    build: .
    command: sh -c "uvicorn mcp_agentskills.api_app:app --host 0.0.0.0 --port 8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-agentskills}:${POSTGRES_PASSWORD:-agentskills}@db:5432/${POSTGRES_DB:-agentskills}
      DEBUG: "false"
      CORS_ORIGINS: ${CORS_ORIGINS}
      LOG_FILE: ""
      SKILL_STORAGE_PATH: /data/skills
    volumes:
      - skills:/data/skills
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  pgdata:
  skills:
